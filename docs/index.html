<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTC Quiz - Baby Therapy Centre Pretoria</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f7fb;
        margin: 0;
        padding: 20px;
        color: #333;
    }
    .container {
        max-width: 900px;
        margin: auto;
        background: white;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 0 15px rgba(0,0,0,0.1);
    }
    h1 {
        text-align: center;
        color: #005b96;
    }
    .intro {
        background: #eef7ff;
        padding: 15px;
        border-left: 5px solid #005b96;
        margin-bottom: 25px;
        border-radius: 6px;
    }
    .question {
        margin-bottom: 25px;
        padding: 15px;
        border: 1px solid #ddd;
        border-radius: 8px;
    }
    .question h3 {
        margin-top: 0;
    }
    button.option {
        display: block;
        width: 100%;
        text-align: left;
        margin: 8px 0;
        padding: 10px;
        border: none;
        background: #e9eef5;
        border-radius: 6px;
        cursor: pointer;
        transition: 0.3s;
    }
    button.option:hover {
        background: #d6e7ff;
    }
    .correct {
        background: #c8f7c5 !important;
    }
    .incorrect {
        background: #ffd0d0 !important;
    }
    .feedback {
        margin-top: 10px;
        padding: 10px;
        border-radius: 6px;
        display: none;
    }
    .feedback.correct {
        background: #e6ffe6;
    }
    .feedback.incorrect {
        background: #fff0f0;
    }
    #scoreBoard {
        position: sticky;
        top: 10px;
        background: #005b96;
        color: white;
        padding: 12px;
        text-align: center;
        border-radius: 8px;
        margin-bottom: 20px;
        font-weight: bold;
    }
    #finalResult {
        display: none;
        margin-top: 30px;
        padding: 20px;
        background: #eef7ff;
        border-radius: 8px;
        text-align: center;
        font-size: 1.2em;
    }
</style>
</head>
<body>
<div class="container">
    <h1>Baby Therapy Centre (BTC) Quiz</h1>
    <div class="intro">
        Test your knowledge about the Baby Therapy Centre in Pretoria, South Africa.
        Answer each question and receive immediate feedback.
    </div>
    <div id="scoreBoard">
        Score: <span id="score">0</span> / 10
    </div>
    <div id="quiz"></div>
    <div id="finalResult"></div>
</div>
<script>
const quizData = [
{
question: "1. In which city is the Baby Therapy Centre located?",
options: ["Cape Town", "Durban", "Pretoria", "Johannesburg"],
correct: 2,
explanation: "BTC is located in Lynnwood, Pretoria."
},
{
question: "2. What age group does BTC primarily serve?",
options: ["Birth to 6 years", "6 to 12 years", "Teenagers only", "Adults"],
correct: 0,
explanation: "BTC focuses on babies and young children from birth to six years old."
},
{
question: "3. Since which year has BTC been helping families?",
options: ["2005", "2010", "1995", "1980"],
correct: 2,
explanation: "The centre has been supporting children and families since 1995."
},
{
question: "4. Which approach is central to BTC's philosophy?",
options: ["Competitive learning", "Family-centred care", "Military discipline", "Boarding school model"],
correct: 1,
explanation: "BTC emphasises a family-centred approach and active parental involvement."
},
{
question: "5. Which of the following therapies is offered by BTC?",
options: ["Hydrotherapy", "Flight Therapy", "Equestrian Racing", "Aviation Training"],
correct: 0,
explanation: "BTC offers hydrotherapy alongside speech, occupational, play, physio and other therapies."
},
{
question: "6. What type of organisation is BTC?",
options: ["Private bank", "Registered non-profit organisation", "Government ministry", "Retail company"],
correct: 1,
explanation: "BTC operates as a registered non-profit organisation."
},
{
question: "7. What is the name of BTC's outreach programme?",
options: ["Hope Initiative", "The Godfather Project", "Future Kids Project", "Little Stars Programme"],
correct: 1,
explanation: "The Godfather Project provides outreach therapy, assessments and caregiver training."
},
{
question: "8. Which condition is specifically mentioned as an area of expertise?",
options: ["Broken bones", "Heart surgery", "Cerebral Palsy", "Dental implants"],
correct: 2,
explanation: "BTC supports children with conditions including Cerebral Palsy, Autism and developmental delays."
},
{
question: "9. Where in Pretoria is BTC situated?",
options: ["Centurion", "Hatfield", "Lynnwood", "Menlyn Mall"],
correct: 2,
explanation: "The centre is located at 347 Elizabeth Grove South, Lynnwood, Pretoria."
},
{
question: "10. What is BTC's overall mission?",
options: [
"Train professional athletes",
"Promote child development and reduce developmental delays",
"Provide university education",
"Offer tourism services"
],
correct: 1,
explanation: "BTC aims to improve child development through early intervention and specialised therapeutic support."
}
];
let score = 0;
let answered = 0;
const quizContainer = document.getElementById("quiz");
quizData.forEach((q, index) => {
    const div = document.createElement("div");
    div.className = "question";
    let html = `<h3>${q.question}</h3>`;
    q.options.forEach((option, i) => {
        html += `
        <button class="option"
            onclick="checkAnswer(this, ${index}, ${i})">
            ${option}
        </button>`;
    });
    html += `
    <div class="feedback" id="feedback-${index}"></div>
    `;
    div.innerHTML = html;
    quizContainer.appendChild(div);
});
function checkAnswer(button, questionIndex, selectedIndex) {
    const questionDiv = button.parentElement;
    if(questionDiv.dataset.answered === "true"){
        return;
    }
    questionDiv.dataset.answered = "true";
    const buttons = questionDiv.querySelectorAll(".option");
    buttons.forEach(btn => btn.disabled = true);
    const feedback = document.getElementById(`feedback-${questionIndex}`);
    const correctIndex = quizData[questionIndex].correct;
    if(selectedIndex === correctIndex){
        button.classList.add("correct");
        feedback.className = "feedback correct";
        feedback.innerHTML =
            "<strong>Correct!</strong><br>" +
            quizData[questionIndex].explanation;
        score++;
    } else {
        button.classList.add("incorrect");
        buttons[correctIndex].classList.add("correct");
        feedback.className = "feedback incorrect";
        feedback.innerHTML =
            "<strong>Incorrect.</strong><br>" +
            quizData[questionIndex].explanation;
    }
    feedback.style.display = "block";
    answered++;
    document.getElementById("score").textContent = score;
    if(answered === quizData.length){
        showFinalResult();
    }
}
function showFinalResult(){
    const result = document.getElementById("finalResult");
    let message = "";
    if(score >= 9){
        message = "Outstanding knowledge of BTC!";
    } else if(score >= 7){
        message = "Very good understanding of the Baby Therapy Centre.";
    } else if(score >= 5){
        message = "Good effort. Consider exploring BTC's services further.";
    } else {
        message = "You may want to learn more about the Baby Therapy Centre.";
    }
    result.innerHTML = `
        <h2>Quiz Complete</h2>
        <p>Your Score: <strong>${score}/10</strong></p>
        <p>${message}</p>
    `;
    result.style.display = "block";
}
</script>
</body>
</html>
