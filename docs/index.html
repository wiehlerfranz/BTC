<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Baby Therapy Centre Quiz</title>

<style>

:root{
    --btc-purple:#8A3D8F;
    --btc-green:#8BC53F;
    --btc-blue:#41B6D8;
    --btc-orange:#F7A22B;
    --btc-bg:#F7FCFD;
    --btc-dark:#34495e;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:20px;
    font-family:Segoe UI, Arial, sans-serif;
    background:var(--btc-bg);
    color:var(--btc-dark);
}

.container{
    max-width:1000px;
    margin:auto;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:20px;
    margin-bottom:20px;
}

.logo{
    max-width:280px;
    width:100%;
    height:auto;
}

h1{
    color:var(--btc-purple);
    margin-bottom:5px;
}

.subtitle{
    color:var(--btc-blue);
    font-size:1.1rem;
}

.intro{
    background:white;
    border-left:8px solid var(--btc-green);
    padding:18px;
    border-radius:10px;
    margin-bottom:20px;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.progress-container{
    background:#dfeef4;
    border-radius:30px;
    overflow:hidden;
    height:22px;
    margin-bottom:10px;
}

.progress-bar{
    height:100%;
    width:0%;
    background:linear-gradient(
        90deg,
        var(--btc-purple),
        var(--btc-blue)
    );
    transition:0.4s;
}

.progress-text{
    text-align:center;
    font-weight:bold;
    margin-bottom:20px;
}

.score-board{
    background:linear-gradient(
        90deg,
        var(--btc-purple),
        var(--btc-blue)
    );
    color:white;
    padding:14px;
    border-radius:12px;
    text-align:center;
    font-size:1.1rem;
    margin-bottom:20px;
}

.question-card{
    background:white;
    padding:22px;
    border-radius:15px;
    margin-bottom:25px;
    box-shadow:0 4px 15px rgba(0,0,0,.08);
}

.question-number{
    color:var(--btc-blue);
    font-weight:bold;
    margin-bottom:10px;
}

.question-title{
    font-size:1.2rem;
    margin-bottom:18px;
}

.option{
    width:100%;
    text-align:left;
    border:none;
    border-radius:10px;
    padding:14px;
    margin-bottom:10px;
    cursor:pointer;
    background:#eef5f8;
    transition:.25s;
    font-size:1rem;
}

.option:hover{
    background:#dff2f9;
    transform:translateY(-2px);
}

.correct{
    background:#dff4cb !important;
}

.incorrect{
    background:#ffd8d8 !important;
}

.feedback{
    display:none;
    margin-top:15px;
    padding:15px;
    border-radius:10px;
}

.feedback.correct{
    border-left:6px solid var(--btc-green);
    background:#f2fae9;
}

.feedback.incorrect{
    border-left:6px solid var(--btc-orange);
    background:#fff3ea;
}

#finalResult{
    display:none;
    background:white;
    padding:30px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 4px 15px rgba(0,0,0,.08);
}

.result-score{
    font-size:2rem;
    color:var(--btc-purple);
    margin-bottom:15px;
}

.badge{
    display:inline-block;
    padding:10px 18px;
    border-radius:30px;
    margin-top:10px;
    font-weight:bold;
}

.restart-btn{
    margin-top:25px;
    background:var(--btc-purple);
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
    font-size:1rem;
}

.restart-btn:hover{
    opacity:.9;
}

.confetti{
    position:fixed;
    width:10px;
    height:10px;
    pointer-events:none;
    animation:fall 3s linear forwards;
}

@keyframes fall{
    from{
        transform:translateY(-50px) rotate(0deg);
        opacity:1;
    }
    to{
        transform:translateY(100vh) rotate(720deg);
        opacity:0;
    }
}

@media(max-width:700px){

.header{
    justify-content:center;
    text-align:center;
}

.logo{
    max-width:220px;
}

}

</style>
</head>

<body>

<div class="container">

<div class="header">

<div>
<h1>Baby Therapy Centre Quiz</h1>
<div class="subtitle">
Discover how much you know about BTC Pretoria
</div>
</div>

<img src="logo.WEBP"
     alt="Baby Therapy Centre Logo"
     class="logo">

</div>

<div class="intro">
Show what you know -
and learn more about Baby Therapy Centre.
</div>

<div class="progress-container">
<div class="progress-bar" id="progressBar"></div>
</div>

<div class="progress-text" id="progressText">
Question 0 of 10 completed
</div>

<div class="score-board">
Score: <span id="score">0</span> / 10
</div>

<div id="quiz"></div>

<div id="finalResult"></div>

</div>

<script>

const allQuestions = [

{
question:"In which city is the Baby Therapy Centre located?",
correct:"Pretoria",
wrong:["Johannesburg","Cape Town","Durban"],
explanation:"BTC is based in Pretoria, South Africa."
},

{
question:"In which suburb is BTC located?",
correct:"Lynnwood",
wrong:["Brooklyn","Waterkloof","Hatfield"],
explanation:"BTC is situated in Lynnwood."
},

{
question:"Since which year has BTC served families?",
correct:"1995",
wrong:["1998","1992","2000"],
explanation:"BTC has been supporting families since 1995."
},

{
question:"Which age group is BTC primarily focused on?",
correct:"Birth to 6 years",
wrong:["6 to 12 years","Birth to 3 years","3 to 10 years"],
explanation:"BTC specialises in early childhood development."
},

{
question:"BTC is a:",
correct:"Non-profit organisation",
wrong:["Government agency","Private hospital","University clinic"],
explanation:"BTC operates as a non-profit organisation."
},

{
question:"Which outreach programme belongs to BTC?",
correct:"The Godfather Project",
wrong:["Future Child Project","Hope Initiative","Guardian Programme"],
explanation:"The Godfather Project extends services into communities."
},

{
question:"Which therapy is offered?",
correct:"Speech Therapy",
wrong:["Radiology","Cardiology","Dermatology"],
explanation:"Speech Therapy is one of BTC's core services."
},

{
question:"Which therapy is offered?",
correct:"Occupational Therapy",
wrong:["Neurosurgery","Oncology","Orthodontics"],
explanation:"Occupational Therapy is part of the multidisciplinary approach."
},

{
question:"Which therapy is offered?",
correct:"Physiotherapy",
wrong:["Plastic Surgery","Dialysis","Cardiac Surgery"],
explanation:"Physiotherapy supports movement and development."
},

{
question:"Which water-based intervention is available?",
correct:"Aqua Therapy",
wrong:["Swimming Coaching","Scuba Therapy","Marine Therapy"],
explanation:"BTC offers Aqua Therapy."
},

{
question:"BTC follows which philosophy?",
correct:"Family-centred care",
wrong:["Military model","Competitive model","Boarding model"],
explanation:"Families are actively involved in therapy."
},

{
question:"Which condition does BTC support?",
correct:"Autism",
wrong:["Appendicitis","Gallstones","Glaucoma"],
explanation:"Autism is one of the developmental conditions supported."
},

{
question:"Which condition does BTC support?",
correct:"Cerebral Palsy",
wrong:["Arthritis","Parkinson's Disease","Osteoporosis"],
explanation:"BTC supports children with Cerebral Palsy."
},

{
question:"Which condition does BTC support?",
correct:"Developmental Delay",
wrong:["Kidney Stones","Migraine","Pneumonia"],
explanation:"Developmental delay is a major focus area."
},

{
question:"Who plays an important role in BTC interventions?",
correct:"Parents and caregivers",
wrong:["Lawyers","Sports coaches","Architects"],
explanation:"Family involvement is central to BTC's philosophy."
},

{
question:"Who was the longest serving Board member of BTC?",
correct:"Leo Graf Luettichau",
wrong:[
    "Manfred von La Chevallerie",
    "Schean Babst",
    "Nelson Mandela"
],
explanation:"Leo served on the Board for over 30 years, from the foundation of the institution to his passing in May 2025."
},

{
question:"Who was the longest serving Chairman of BTC?",
correct:"Manfred von La Chevallerie",
wrong:[
    "Neithard Graf von Duerckheim",
    "Ingo Gevers",
    "Ruth Stubbs"
],
explanation:"Manfred ran the Centre for 25 years and is lovingly referred to by staff as 'Dr. Chev'."
},

{
question:"How many different therapy disciplines does BTC provide?",
correct:"Six",
wrong:[
    "Four",
    "Eight",
    "Ten"
],
explanation:"BTC offers Occupational Therapy, Physiotherapy, Aqua Therapy, Play Therapy, Speech Therapy as well as Orthotics & Prosthetics."
},

{
question:"Which of the following is not one of BTC's training offerings?",
correct:"Time Management",
wrong:[
    "Communication",
    "Seating & Positioning",
    "The Rights of Children with Disabilities"
],
explanation:"BTC offers eight different training modules relevant to parents and caregivers. Time Management is not one of them."
},

{
question:"How many spots does Daycare offer?",
correct:"Twelve",
wrong:[
    "Five",
    "Eight",
    "Fifteen"
],
explanation:"Up to twelve children can be supported in Daycare."
},

{
question:"Which remuneration do BTC's Board members receive?",
correct:"Children's smiles",
wrong:[
    "R10,000 per month",
    "R1,500 per meeting",
    "Coffee upon request"
],
explanation:"Board members provide their services in an honorary capacity. Children's smiles are the best possible currency."
},

{
question:"What is next door to BTC?",
correct:"Chrysalis School & Developmental Centre",
wrong:[
    "The police station",
    "A community park",
    "Pick & Pay"
],
explanation:"Chrysalis was also founded by Johanniterorden and serves children from approximately six to eighteen years old."
}
];

function shuffle(arr){
    let array=[...arr];

    for(let i=array.length-1;i>0;i--){
        let j=Math.floor(Math.random()*(i+1));
        [array[i],array[j]]=[array[j],array[i]];
    }

    return array;
}

const quizData=shuffle(allQuestions)
.slice(0,10)
.map(q=>{

    let options=shuffle([
        q.correct,
        ...q.wrong
    ]);

    return{
        question:q.question,
        options,
        correctIndex:options.indexOf(q.correct),
        explanation:q.explanation
    };

});

let score=0;
let answered=0;

const quiz=document.getElementById("quiz");

quizData.forEach((q,index)=>{

    let card=document.createElement("div");
    card.className="question-card";

    let html=`
    <div class="question-number">
    Question ${index+1}
    </div>

    <div class="question-title">
    ${q.question}
    </div>
    `;

    q.options.forEach((option,i)=>{

        html+=`
        <button
        class="option"
        onclick="checkAnswer(this,${index},${i})">
        ${option}
        </button>
        `;
    });

    html+=`
    <div class="feedback"
         id="feedback-${index}">
    </div>
    `;

    card.innerHTML=html;
    quiz.appendChild(card);

});

function updateProgress(){

    document.getElementById("progressBar").style.width =
    (answered/10)*100 + "%";

    document.getElementById("progressText").innerText =
    `Question ${answered} of 10 completed`;
}

function checkAnswer(button,qIndex,selected){

    let card=button.parentElement;

    if(card.dataset.done==="yes"){
        return;
    }

    card.dataset.done="yes";

    const buttons=card.querySelectorAll(".option");

    buttons.forEach(btn=>btn.disabled=true);

    const feedback=document.getElementById(
        `feedback-${qIndex}`
    );

    const correct=quizData[qIndex].correctIndex;

    if(selected===correct){

        button.classList.add("correct");

        feedback.className="feedback correct";

        feedback.innerHTML=
        "<strong>Correct!</strong><br>" +
        quizData[qIndex].explanation;

        score++;

    }else{

        button.classList.add("incorrect");
        buttons[correct].classList.add("correct");

        feedback.className="feedback incorrect";

        feedback.innerHTML=
        "<strong>Not quite.</strong><br>" +
        quizData[qIndex].explanation;
    }

    feedback.style.display="block";

    answered++;

    document.getElementById("score").innerText=score;

    updateProgress();

    if(answered===10){
        showResult();
    }
}

function showResult(){

    const result=document.getElementById("finalResult");

    let title="";
    let badgeColor="";
    let badgeText="";

    if(score===10){

        title="Outstanding!";
        badgeColor="#8BC53F";
        badgeText="BTC Expert";

        launchConfetti();

    }else if(score>=8){

        title="Excellent!";
        badgeColor="#41B6D8";
        badgeText="Advanced";

    }else if(score>=6){

        title="Good Result";
        badgeColor="#F7A22B";
        badgeText="Knowledgeable";

    }else{

        title="Keep Learning";
        badgeColor="#8A3D8F";
        badgeText="Explorer";
    }

    result.innerHTML=`
    <h2>${title}</h2>

    <div class="result-score">
        ${score}/10
    </div>

    <div class="badge"
         style="background:${badgeColor};color:white;">
         ${badgeText}
    </div>

    <p>
    Thank you for learning more about the
    Baby Therapy Centre.
    </p>

    <button class="restart-btn"
            onclick="location.reload()">
            Try Another Quiz
    </button>
    `;

    result.style.display="block";

    window.scrollTo({
        top:document.body.scrollHeight,
        behavior:"smooth"
    });
}

function launchConfetti(){

    const colors=[
        "#8A3D8F",
        "#8BC53F",
        "#41B6D8",
        "#F7A22B"
    ];

    for(let i=0;i<120;i++){

        const confetti=document.createElement("div");

        confetti.className="confetti";

        confetti.style.left=
        Math.random()*100+"vw";

        confetti.style.background=
        colors[Math.floor(Math.random()*colors.length)];

        confetti.style.animationDelay=
        Math.random()*2+"s";

        document.body.appendChild(confetti);

        setTimeout(()=>{
            confetti.remove();
        },3000);
    }
}

</script>

</body>
</html>
